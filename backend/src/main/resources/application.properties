spring.application.name=backend
server.port=8080

# CORS - override in application-local.properties for dev
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# AWS region - ECS injects AWS_REGION automatically; fallback for local dev
aws.region=${AWS_REGION:us-east-1}

# S3
s3.bucket=${S3_BUCKET:recipe-images-dev}

# JWT issuer - uncomment in Phase 8 when Cognito exists
# spring.security.oauth2.resourceserver.jwt.issuer-uri=${COGNITO_ISSUER_URI}
